version: 2

project_name: prevly

before:
  hooks:
    - go mod tidy

builds:
  - id: prevly
    main: ./cmd/prevly
    binary: prevly
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: prevly
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - examples/*
      - packaging/*

dockers:
  - image_templates:
      - "ghcr.io/redboarddev/prevly:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/redboarddev/prevly:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/redboarddev/prevly:{{ .Version }}"
    image_templates:
      - "ghcr.io/redboarddev/prevly:{{ .Version }}-amd64"
      - "ghcr.io/redboarddev/prevly:{{ .Version }}-arm64"
  - name_template: "ghcr.io/redboarddev/prevly:latest"
    image_templates:
      - "ghcr.io/redboarddev/prevly:{{ .Version }}-amd64"
      - "ghcr.io/redboarddev/prevly:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"

release:
  draft: true
